<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    overflow:hidden;
    height:100vh;
}

h1{
    color:white;
    margin-top:120px;
    font-size:3rem;
    text-shadow:2px 2px 5px rgba(0,0,0,0.2);
}

p{
    color:white;
    font-size:1.3rem;
    margin-top:15px;
}

.buttons{
    margin-top:50px;
    position:relative;
    height:250px;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff1493;
    color:white;
    margin-right:20px;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:white;
    color:#ff1493;
    position:absolute;
}

#result{
    display:none;
    margin-top:40px;
    color:white;
    animation:pop 1s ease;
}

#result h2{
    font-size:3rem;
    margin-bottom:20px;
}

#result p{
    font-size:1.5rem;
    max-width:800px;
    margin:auto;
    line-height:1.8;
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

.heart{
    position:fixed;
    top:-20px;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

.firework{
    position:fixed;
    font-size:40px;
    pointer-events:none;
    animation:explode 1.5s ease-out forwards;
}

@keyframes explode{
    0%{
        transform:scale(0);
        opacity:1;
    }
    100%{
        transform:scale(5);
        opacity:0;
    }
}

.love-background{
    background:
    linear-gradient(
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.45)
    ),
    url('images.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    transition:all 1.5s ease;
}

.photo-frame{
    width:300px;
    height:300px;
    margin:0 auto 25px auto;
    border-radius:25px;
    overflow:hidden;
    border:6px solid white;

    animation:glow 2s infinite alternate;

    box-shadow:
        0 0 20px #fff,
        0 0 40px #ff69b4,
        0 0 60px #ff1493;
}

.photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes glow{
    from{
        box-shadow:
        0 0 20px #fff,
        0 0 40px #ff69b4;
    }

    to{
        box-shadow:
            0 0 30px #fff,
            0 0 60px #ff1493,
            0 0 90px #ff69b4;
    }
}
</style>
</head>

<body>

<h1>💖 Do You Love Me? 💖</h1>

<p id="introText">
    Choose carefully... 😘
</p>

<div class="buttons">
    <button id="yesBtn">❤️ Yes ❤️</button>
    <button id="noBtn">🙈 No 🙈</button>
</div>

<div id="result">

    <div class="photo-frame">
        <img src="images.jpg" alt="Love Photo">
    </div>

    <h2>💖 I Love You Too 💖</h2>

    <p>
        Thank you for making my life beautiful ❤️
        <br><br>

        You are my smile, my happiness,
        and my favorite person in the world 🌍💕
        <br><br>

        Every moment with you feels magical ✨
        <br><br>

        Forever & Always ❤️😘
            <br><br>
    Sanjeev Kumar ❤️😎
    </p>

</div>

<audio id="loveMusic" loop>
    <source src="love-song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

// Initialize EmailJS
emailjs.init({
    publicKey: "UT7y3XyqddE9NjVVn"
});

const noBtn = document.getElementById("noBtn");

// Move NO button
noBtn.addEventListener("mouseover", () => {

    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES button click
document.getElementById("yesBtn").addEventListener("click", () => {

    // Send Email
    emailjs.send(
        "service_faiicux",
        "template_9csjwua",
        {
            name: "Love Visitor",
            message: "Someone clicked YES ❤️",
            time: new Date().toLocaleString()
        }
    )
    .then(() => {
        console.log("Email sent successfully");
    })
    .catch((error) => {
        console.error("Email error:", error);
    });

    // Change background
    document.body.classList.add("love-background");

    // Play music
    const music = document.getElementById("loveMusic");

    music.play().catch(err => {
        console.log("Music playback blocked:", err);
    });

    // Hide intro content
    document.querySelector("h1").style.display = "none";
    document.getElementById("introText").style.display = "none";
    document.querySelector(".buttons").style.display = "none";

    // Show result
    document.getElementById("result").style.display = "block";

    // Hearts
    for(let i=0;i<60;i++){
        setTimeout(createHeart, i * 80);
    }

    // Fireworks
    for(let i=0;i<20;i++){
        setTimeout(createFirework, i * 250);
    }

    // Continuous heart rain
    setInterval(createHeart, 600);
});

// Falling Hearts
function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML =
        ["❤️","💖","💕","💘","💝"]
        [Math.floor(Math.random()*5)];

    heart.style.left =
        Math.random()*window.innerWidth + "px";

    heart.style.fontSize =
        (20 + Math.random()*40) + "px";

    heart.style.animationDuration =
        (3 + Math.random()*4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}

// Fireworks
function createFirework(){

    const fw = document.createElement("div");

    fw.classList.add("firework");

    fw.innerHTML =
        ["❤️","💖","💕","💘","💝"]
        [Math.floor(Math.random()*5)];

    fw.style.left =
        Math.random()*window.innerWidth + "px";

    fw.style.top =
        Math.random()*window.innerHeight + "px";

    document.body.appendChild(fw);

    setTimeout(() => {
        fw.remove();
    }, 1500);
}

</script>

</body>
</html>
